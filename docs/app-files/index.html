<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Project Title</title>
<style>
:root{ --vtb-primary:#000000; --vtb-fg:rgba(255,255,255,.88); --vtb-muted:rgba(255,255,255,.42); }
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#111;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
#pano{position:absolute;inset:0;width:100%;height:100%}
#vtb-bar{
  position:fixed;bottom:22px;left:50%;transform:translateX(-50%);z-index:100;
  display:flex;align-items:center;justify-content:flex-start;flex-wrap:nowrap;gap:5px 6px;
  padding:8px 16px;width:max-content;
  max-width:calc(100vw - 16px);
  overflow-x:auto;overflow-y:hidden;-webkit-overflow-scrolling:touch;
  scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.28) transparent;
  background:rgba(255,255,255,.1);backdrop-filter:blur(22px) saturate(160%);
  -webkit-backdrop-filter:blur(22px) saturate(160%);
  border:1px solid rgba(255,255,255,.22);border-radius:999px;
  box-shadow:0 12px 40px rgba(0,0,0,.18),0 1px 0 rgba(255,255,255,.35) inset;
  transition:opacity 280ms ease,transform 280ms ease;
}
#vtb-bar::-webkit-scrollbar{height:5px}
#vtb-bar::-webkit-scrollbar-thumb{background:rgba(255,255,255,.28);border-radius:6px}
#vtb-bar.vtb-bar--hidden{
  opacity:0;pointer-events:none;
  transform:translateX(-50%) translateY(calc(100% + 28px));
}
.vtb-brand{display:flex;align-items:center;gap:8px;padding-right:4px}
.vtb-logo{height:24px;width:auto;border-radius:6px;display:block;opacity:.98;
  box-shadow:0 2px 10px rgba(0,0,0,.14)}
.vtb-sep{width:1px;height:22px;background:rgba(255,255,255,.22);margin:0 2px;flex-shrink:0;border-radius:1px}
.vtb-btn,.vtb-btn-sm{
  display:flex;align-items:center;justify-content:center;border:none;cursor:pointer;
  border-radius:50%;transition:background 140ms,color 140ms,transform 100ms,box-shadow 140ms,border-color 140ms;
  padding:0;flex-shrink:0;color:rgba(255,255,255,.94);
  background:transparent;
  border:1px solid transparent;
  box-shadow:none;
}
.vtb-btn{width:36px;height:36px}
.vtb-btn-sm{width:32px;height:32px}
.vtb-btn:hover,.vtb-btn-sm:hover{
  background:rgba(255,255,255,.2);
  border-color:rgba(255,255,255,.28);
  box-shadow:0 4px 14px rgba(0,0,0,.1);
}
.vtb-btn:active,.vtb-btn-sm:active{transform:scale(.94)}
.vtb-btn svg,.vtb-btn-sm svg{stroke:currentColor;opacity:.96;filter:drop-shadow(0 1px 2px rgba(0,0,0,.25))}
.vtb-btn-play svg{fill:currentColor;stroke:none;opacity:1;filter:none}
.vtb-btn-play.is-on{
  background:rgba(255,255,255,.22);
  color:var(--vtb-primary);
  border-color:rgba(255,255,255,.38);
  box-shadow:0 2px 12px rgba(0,0,0,.12);
}
.vtb-btn-play.is-on svg{stroke:var(--vtb-primary);opacity:1}
.vtb-group{display:flex;align-items:center;gap:2px;padding:2px 4px;border-radius:999px;
  background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.18);
  box-shadow:0 1px 0 rgba(255,255,255,.25) inset}
#vtb-scene-name{font-size:12px;font-weight:500;color:rgba(255,255,255,.72);padding:0 6px;max-width:min(140px,28vw);
  overflow:hidden;text-overflow:ellipsis;flex-shrink:1;letter-spacing:.01em;
  text-shadow:0 1px 2px rgba(0,0,0,.2)}
#vtb-restore-ui{
  position:fixed;bottom:22px;left:50%;transform:translateX(-50%);z-index:101;
  width:46px;height:46px;border-radius:50%;
  border:1px solid rgba(255,255,255,.22);
  background:rgba(255,255,255,.1);backdrop-filter:blur(22px) saturate(160%);
  -webkit-backdrop-filter:blur(22px) saturate(160%);
  color:rgba(255,255,255,.92);cursor:pointer;display:none;align-items:center;justify-content:center;
  box-shadow:0 12px 40px rgba(0,0,0,.18),0 1px 0 rgba(255,255,255,.35) inset;
  transition:transform 160ms,background 160ms,border-color 160ms;
}
#vtb-restore-ui:hover{background:rgba(255,255,255,.18);border-color:rgba(255,255,255,.32)}
#vtb-restore-ui:active{transform:translateX(-50%) scale(.95)}
#vtb-restore-ui svg{filter:drop-shadow(0 1px 1px rgba(0,0,0,.2))}
body.vtb-bar-hidden #vtb-restore-ui{display:flex}
/* Navegación lateral escenas (mismo cristal que la barra) */
.vtb-side-nav{
  position:fixed;top:50%;z-index:100;
  width:44px;height:44px;border-radius:50%;
  border:1px solid rgba(255,255,255,.22);
  background:rgba(255,255,255,.1);backdrop-filter:blur(22px) saturate(160%);
  -webkit-backdrop-filter:blur(22px) saturate(160%);
  color:rgba(255,255,255,.94);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  padding:0;border:none;
  box-shadow:0 12px 40px rgba(0,0,0,.18),0 1px 0 rgba(255,255,255,.35) inset;
  transition:background 160ms,border-color 160ms,transform 120ms,opacity 200ms;
}
#vtb-side-prev{
  left:max(12px, env(safe-area-inset-left, 0px));
  transform:translateY(-50%);
}
#vtb-side-next{
  right:max(12px, env(safe-area-inset-right, 0px));
  transform:translateY(-50%);
}
.vtb-side-nav:hover{
  background:rgba(255,255,255,.18);border-color:rgba(255,255,255,.32);
}
#vtb-side-prev:active,#vtb-side-next:active{transform:translateY(-50%) scale(.94)}
.vtb-side-nav svg{stroke:currentColor;filter:drop-shadow(0 1px 2px rgba(0,0,0,.25))}
.vtb-side-nav.vtb-side-nav--off{opacity:0;pointer-events:none;visibility:hidden}
html.vtb-fullscreen .vtb-side-nav{width:52px;height:52px}
html.vtb-fullscreen #vtb-side-prev{left:max(18px, env(safe-area-inset-left, 0px))}
html.vtb-fullscreen #vtb-side-next{right:max(18px, env(safe-area-inset-right, 0px))}
html.vtb-fullscreen .vtb-side-nav svg{width:22px;height:22px}
#vtb-brand-wrap.vtb-brand-wrap--hidden{display:none!important}
.vtb-logo-user{display:none}
.vtb-logo-user.is-visible{display:block!important}
/* Herramientas superior derecha: logo + plano */
.vtb-right-tools{
  position:fixed;top:max(14px, env(safe-area-inset-top, 0px));z-index:100;
  right:max(14px, env(safe-area-inset-right, 0px));
  display:flex;flex-direction:column;gap:18px;align-items:center;
}
html.vtb-fullscreen .vtb-right-tools{
  top:max(20px, env(safe-area-inset-top, 0px));
  right:max(20px, env(safe-area-inset-right, 0px));
  gap:22px;
}
.vtb-tool-btn{
  width:52px;height:52px;border-radius:50%;border:1px solid rgba(255,255,255,.22);
  background:rgba(255,255,255,.1);backdrop-filter:blur(22px) saturate(160%);
  -webkit-backdrop-filter:blur(22px) saturate(160%);
  color:rgba(255,255,255,.94);cursor:pointer;padding:0;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 12px 40px rgba(0,0,0,.18),0 1px 0 rgba(255,255,255,.35) inset;
  transition:background 160ms,border-color 160ms,transform 200ms cubic-bezier(.4,0,.2,1),opacity 200ms ease;
}
.vtb-tool-btn:hover{background:rgba(255,255,255,.18);border-color:rgba(255,255,255,.32)}
.vtb-tool-btn:active{transform:scale(.94)}
.vtb-tool-btn.vtb-tool-btn--hidden{transform:scale(.4);opacity:0;pointer-events:none}
.vtb-tool-btn svg{width:22px;height:22px;stroke:currentColor;filter:drop-shadow(0 1px 2px rgba(0,0,0,.25))}
html.vtb-fullscreen .vtb-tool-btn{width:58px;height:58px}
html.vtb-fullscreen .vtb-tool-btn svg{width:26px;height:26px}
.vtb-file-input{position:absolute;width:0;height:0;opacity:0;pointer-events:none}
/* Logo Marval / marca: esquina superior izquierda (~20% más grande que .vtb-tool-btn 52→62px) */
.vtb-top-left-wrap{
  position:fixed;
  top:max(14px, env(safe-area-inset-top, 0px));
  left:max(14px, env(safe-area-inset-left, 0px));
  z-index:101;
  display:flex;
  align-items:flex-start;
  gap:14px;
}
.vtb-top-left-logo{
  position:relative;line-height:0;display:block;border:none!important;background:transparent!important;
  border-radius:0;overflow:visible;box-shadow:none!important;
  transition:transform .15s ease,opacity .2s ease;
}
.vtb-top-left-logo:hover{transform:scale(1.04)}
.vtb-top-left-logo:active{transform:scale(.98)}
.vtb-top-left-logo img{
  display:block;height:62px;width:auto;max-width:min(200px,42vw);object-fit:contain;
  vertical-align:top;background:transparent;
}
html.vtb-fullscreen .vtb-top-left-logo img{height:70px;max-width:min(220px,44vw)}
/* Letrero de datos del inmueble (estilo barra inferior) */
.vtb-property-badge{
  position:relative;
  display:flex;
  flex-direction:column;
  align-items:flex-start;
  gap:6px;
  padding:10px 14px;
  max-width:min(56vw,460px);
  background:rgba(255,255,255,.1);backdrop-filter:blur(22px) saturate(160%);
  -webkit-backdrop-filter:blur(22px) saturate(160%);
  border:1px solid rgba(255,255,255,.22);border-radius:14px;
  box-shadow:0 10px 30px rgba(0,0,0,.16),0 1px 0 rgba(255,255,255,.3) inset;
  color:rgba(255,255,255,.88);font-size:14.4px;line-height:1.25;
}
.vtb-property-item{white-space:normal}
.vtb-property-item strong{font-weight:700;color:#fff}
html.vtb-fullscreen .vtb-property-badge{
  font-size:17.3px;
  padding:12px 18px;
  gap:8px;
}
html.vtb-fullscreen .vtb-top-left-wrap{
  top:max(20px, env(safe-area-inset-top, 0px));
  left:max(20px, env(safe-area-inset-left, 0px));
  gap:16px;
}
/* Plano: superior derecha, sin fondo; imagen + puntos */
#vtb-floorplan-panel{
  position:fixed;z-index:102;
  top:max(calc(14px + 52px + 18px), calc(env(safe-area-inset-top, 0px) + 80px));
  right:max(14px, env(safe-area-inset-right, 0px));
  display:flex;flex-direction:column;align-items:flex-end;gap:4px;
  max-width:min(480px,56vw);
  background:transparent!important;border:none!important;box-shadow:none!important;
  backdrop-filter:none!important;-webkit-backdrop-filter:none!important;
  padding:0;margin:0;
  transform-origin:top right;
  transform:scale(.4);opacity:0;pointer-events:none;
  transition:transform .32s cubic-bezier(.4,0,.2,1),opacity .28s ease;
}
#vtb-floorplan-panel.is-open{transform:scale(1);opacity:1;pointer-events:auto}
#vtb-floorplan-close{
  flex-shrink:0;width:36px;height:36px;border:none;background:transparent!important;
  color:#fff;cursor:pointer;font-size:24px;line-height:1;padding:0;
  text-shadow:0 1px 4px rgba(0,0,0,.95),0 0 10px rgba(0,0,0,.6);
  display:flex;align-items:center;justify-content:center;
}
#vtb-floorplan-close:hover{opacity:.85}
.vtb-floorplan-stage{
  position:relative;display:inline-block;line-height:0;max-width:min(480px,56vw);
}
#vtb-floorplan-img{
  display:block;max-width:100%;max-height:min(56vh,640px);width:auto;height:auto;
  object-fit:contain;vertical-align:top;
}
.vtb-floorplan-hotspots{
  position:absolute;left:0;top:0;width:100%;height:100%;pointer-events:none;
}
.vtb-floorplan-dot{
  position:absolute;transform:translate(-50%,-50%);pointer-events:auto;
  width:18px;height:18px;border-radius:50%;border:2px solid rgba(255,255,255,.85);cursor:pointer;padding:0;
  background:rgba(55,55,62,.92);box-shadow:0 2px 10px rgba(0,0,0,.55);
  transition:transform .22s cubic-bezier(.4,0,.2,1),background .32s ease,box-shadow .32s ease,border-color .28s ease;
}
.vtb-floorplan-dot:hover{transform:translate(-50%,-50%) scale(1.15)}
.vtb-floorplan-dot.vtb-fp-active{
  background:#22c55e;border-color:#fff;
  box-shadow:0 0 0 4px rgba(34,197,94,.35),0 2px 12px rgba(0,0,0,.45);
  animation:vtb-fp-pulse 1.6s ease-in-out infinite;
}
@keyframes vtb-fp-pulse{
  0%,100%{box-shadow:0 0 0 4px rgba(34,197,94,.35),0 2px 12px rgba(0,0,0,.45)}
  50%{box-shadow:0 0 0 8px rgba(34,197,94,.18),0 2px 16px rgba(34,197,94,.25)}
}
@keyframes vtb-fp-pop{
  0%{transform:translate(-50%,-50%) scale(.5);opacity:0}
  60%{transform:translate(-50%,-50%) scale(1.25);opacity:1}
  100%{transform:translate(-50%,-50%) scale(1)}
}
.vtb-floorplan-dot.vtb-fp-anim-in{animation:vtb-fp-pop .36s cubic-bezier(.34,1.56,.64,1) forwards}
/* ── Galería / Carrusel ── */
.vtb-gallery-overlay{
  position:fixed;inset:0;z-index:300;
  background:rgba(0,0,0,.72)!important;
  display:flex;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;
  transition:opacity .32s ease;
}
.vtb-gallery-overlay.is-open{opacity:1;pointer-events:auto}
.vtb-gallery-close{
  position:absolute;top:-14px;right:-14px;
  width:38px;height:38px;border-radius:50%;border:none;cursor:pointer;
  background:rgba(0,0,0,.55);color:rgba(255,255,255,.9);font-size:22px;line-height:1;
  display:flex;align-items:center;justify-content:center;
  z-index:302;transition:background .15s,color .15s,transform .12s;
  backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);
}
.vtb-gallery-close:hover{background:rgba(0,0,0,.8);color:#fff;transform:scale(1.08)}
.vtb-gallery-arrow{
  position:absolute;top:50%;transform:translateY(-50%);
  width:52px;height:52px;border-radius:50%;border:none;cursor:pointer;
  background:rgba(255,255,255,.08);color:rgba(255,255,255,.85);
  display:flex;align-items:center;justify-content:center;
  transition:background .18s,color .18s,transform .12s;z-index:301;
}
.vtb-gallery-arrow:hover{background:rgba(255,255,255,.18);color:#fff}
.vtb-gallery-arrow:active{transform:translateY(-50%) scale(.93)}
.vtb-gallery-arrow--left{left:max(18px,env(safe-area-inset-left,0px))}
.vtb-gallery-arrow--right{right:max(18px,env(safe-area-inset-right,0px))}
.vtb-gallery-content{
  position:relative;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  max-width:88vw;max-height:88vh;gap:0;
}
.vtb-gallery-img{
  max-width:86vw;max-height:74vh;width:auto;height:auto;object-fit:contain;
  border-radius:10px;box-shadow:0 16px 60px rgba(0,0,0,.6);
  transition:opacity .28s ease;
}
.vtb-gallery-img.vtb-fade{opacity:0}
.vtb-gallery-title{
  margin-top:18px;color:#fff;font-size:20px;font-weight:700;
  text-align:center;max-width:80vw;
  text-shadow:0 2px 10px rgba(0,0,0,.6);
  letter-spacing:.01em;
  transition:opacity .28s ease;
}
.vtb-gallery-title.vtb-fade{opacity:0}
.vtb-gallery-counter{
  margin-top:8px;color:rgba(255,255,255,.4);font-size:13px;font-weight:500;
  letter-spacing:.08em;
}
html.vtb-fullscreen .vtb-gallery-arrow{width:60px;height:60px}
html.vtb-fullscreen .vtb-gallery-arrow svg{width:24px;height:24px}
html.vtb-fullscreen .vtb-gallery-img{max-width:90vw;max-height:78vh}
html.vtb-fullscreen .vtb-gallery-title{font-size:24px}
html.vtb-fullscreen .vtb-gallery-close{width:44px;height:44px;font-size:26px;top:-16px;right:-16px}
html.vtb-fullscreen #vtb-floorplan-panel{
  top:max(calc(20px + 58px + 22px), calc(env(safe-area-inset-top, 0px) + 100px));
  right:max(20px, env(safe-area-inset-right, 0px));
  max-width:min(520px,58vw);
}
html.vtb-fullscreen #vtb-floorplan-img{max-height:min(60vh,700px)}
html.vtb-fullscreen .vtb-floorplan-stage{max-width:min(520px,58vw)}
/* Pantalla completa: barra y controles proporcionales al viewport (evita que se vea “pequeña”) */
html.vtb-fullscreen #vtb-bar{
  max-width:min(92vw, calc(100vw - 48px), calc(100dvw - 48px));
  padding:12px 24px;
  gap:8px 12px;
  bottom:max(28px, 2.5vh);
}
html.vtb-fullscreen .vtb-btn{width:44px;height:44px}
html.vtb-fullscreen .vtb-btn-sm{width:38px;height:38px}
html.vtb-fullscreen .vtb-sep{height:28px}
html.vtb-fullscreen #vtb-bar .vtb-btn svg,
html.vtb-fullscreen #vtb-bar .vtb-btn-sm svg{width:18px;height:18px}
html.vtb-fullscreen #vtb-bar .vtb-btn-play svg,
html.vtb-fullscreen #vtb-bar #icon-play,
html.vtb-fullscreen #vtb-bar #icon-pause{width:20px;height:20px}
html.vtb-fullscreen .vtb-btn-play svg{fill:currentColor;stroke:none}
html.vtb-fullscreen #vtb-scene-name{font-size:14px;max-width:min(260px,38vw)}
html.vtb-fullscreen .vtb-logo{height:30px}
html.vtb-fullscreen .vtb-group{gap:4px;padding:0 6px}
html.vtb-fullscreen #vtb-restore-ui{width:54px;height:54px;bottom:max(28px,2.5vh)}
html.vtb-fullscreen #vtb-panel{max-width:min(92vw,880px);bottom:min(92px, 14vh);padding:18px 22px;border-radius:22px}
html.vtb-fullscreen body.vtb-bar-hidden #vtb-panel{bottom:28px}
html.vtb-fullscreen #vtb-panel h3{font-size:12px;margin-bottom:12px;letter-spacing:.14em}
html.vtb-fullscreen #vtb-grid{gap:12px}
html.vtb-fullscreen .vtb-thumb{width:158px;min-width:158px;border-radius:12px}
html.vtb-fullscreen .vtb-thumb img{height:84px}
html.vtb-fullscreen .vtb-thumb span{font-size:12px;padding:6px 8px;max-width:158px}
html.vtb-fullscreen .vtb-hotspot-btn{width:66px;height:66px}
html.vtb-fullscreen .vtb-hotspot-btn svg{width:60px!important;height:60px!important}
html.vtb-fullscreen .vtb-hotspot-tip{top:74px;font-size:12px;padding:8px 12px;max-width:280px;border-radius:12px}
html.vtb-fullscreen .vtb-hotspot-info-card{top:72px;width:270px;padding:12px 14px;border-radius:14px}
html.vtb-fullscreen .vtb-hotspot-info-title{font-size:14px}
html.vtb-fullscreen .vtb-hotspot-info-text{font-size:13px}
#vtb-panel{
  position:fixed;bottom:74px;left:50%;transform:translateX(-50%) translateY(10px);z-index:99;
  background:rgba(255,255,255,.1);backdrop-filter:blur(22px) saturate(160%);
  -webkit-backdrop-filter:blur(22px) saturate(160%);
  border:1px solid rgba(255,255,255,.22);border-radius:18px;
  padding:14px 18px;opacity:0;pointer-events:none;
  box-shadow:0 12px 40px rgba(0,0,0,.18);
  transition:opacity 180ms,transform 180ms,bottom 280ms ease;min-width:220px;max-width:min(96vw,720px);
}
#vtb-panel.open{opacity:1;transform:translateX(-50%) translateY(0);pointer-events:auto}
body.vtb-bar-hidden #vtb-panel{bottom:28px}
#vtb-panel h3{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;
  color:rgba(255,255,255,.55);margin-bottom:10px;text-shadow:0 1px 2px rgba(0,0,0,.2)}
#vtb-grid{
  display:flex;flex-direction:row;flex-wrap:nowrap;gap:10px;align-items:stretch;
  overflow-x:auto;overflow-y:hidden;-webkit-overflow-scrolling:touch;
  padding-bottom:6px;margin:0 -4px;padding-left:4px;padding-right:4px;
  scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.25) transparent
}
#vtb-grid::-webkit-scrollbar{height:6px}
#vtb-grid::-webkit-scrollbar-thumb{background:rgba(255,255,255,.22);border-radius:6px}
.vtb-thumb{
  cursor:pointer;border-radius:10px;border:2px solid rgba(255,255,255,.2);overflow:hidden;
  transition:border-color 140ms,transform 140ms,box-shadow 140ms;
  background:rgba(255,255,255,.08);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  box-shadow:0 4px 16px rgba(0,0,0,.12);
  flex:0 0 auto;width:132px;min-width:132px
}
.vtb-thumb:hover{transform:scale(1.04);box-shadow:0 6px 20px rgba(0,0,0,.18)}
.vtb-thumb.active{border-color:#000000;box-shadow:0 0 0 1px #000000,0 6px 22px rgba(0,0,0,.15)}
.vtb-thumb img{width:100%;height:72px;object-fit:cover;object-position:center center;display:block}
.vtb-thumb span{display:block;font-size:11px;color:rgba(255,255,255,.88);text-align:center;
  padding:4px 6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:132px;
  text-shadow:0 1px 3px rgba(0,0,0,.35)}

.vtb-hotspot{
  position: relative;
  transform: translate(-50%, -50%);
  user-select: none;
}
.vtb-hotspot-anim{
  animation: vtbHotspotPulse 2.2s ease-in-out infinite;
  transform-origin: center center;
}
@keyframes vtbHotspotPulse{
  0%, 100%{ transform: scale(1); opacity: 1; }
  50%{ transform: scale(1.13); opacity: 0.92; }
}
.vtb-hotspot-btn{
  width: 56px;
  height: 56px;
  padding: 0;
  border: none;

  /** Dirección de vista (RectilinearView) → cara del cubo más alineada (como Marzipano CubeGeometry). */
  function closestFaceForInitialView(iv) {
    var yaw = Number(iv && iv.yaw != null ? iv.yaw : 0);
    var pitch = Number(iv && iv.pitch != null ? iv.pitch : 0);
    var x = Math.sin(yaw) * Math.cos(pitch);
    var y = -Math.sin(pitch);
    var z = -Math.cos(yaw) * Math.cos(pitch);
    var fv = {
      f: [0, 0, -1], b: [0, 0, 1], l: [-1, 0, 0], r: [1, 0, 0], u: [0, 1, 0], d: [0, -1, 0]
    };
    var faces = ['f', 'b', 'l', 'r', 'u', 'd'];
    var best = 'f';
    var bestDot = -2;
    for (var i = 0; i < faces.length; i++) {
      var ff = faces[i];
      var v = fv[ff];
      var dot = x * v[0] + y * v[1] + z * v[2];
      if (dot > bestDot) {
        bestDot = dot;
        best = ff;
      }
    }
    return best;
  }

  function firstNonFallbackLevelIndex(levels) {
    if (!levels || !levels.length) return 0;
    for (var k = 0; k < levels.length; k++) {
      if (!levels[k].fallbackOnly) return k;
    }
    return levels.length - 1;
  }

  /** Orden vertical de caras en preview.jpg (Marzipano ImageUrlSource por defecto). */
  var PREVIEW_FACE_ORDER = 'bdflru';

  function previewObjectPositionForFace(face) {
    var idx = PREVIEW_FACE_ORDER.indexOf(face);
    if (idx < 0) idx = 2;
    var pct = ((idx + 0.5) / 6) * 100;
    return 'center ' + pct.toFixed(2) + '%';
  }

  function thumbTileUrl(scene) {
    var face = closestFaceForInitialView(scene.initialViewParameters);
    var z = firstNonFallbackLevelIndex(scene.levels);
    return 'tiles/' + encodeURIComponent(scene.id) + '/' + z + '/' + face + '/0/0.jpg';
  }

  var viewer = new Marzipano.Viewer(document.getElementById('pano'), {
    controls: { mouseViewMode: 'drag' },
    stage: { progressive: true }
  });

  var autorotateOpts = {
    yawSpeed: 0.055,
    yawAccel: 0.02,
    targetPitch: 0,
    pitchSpeed: 0.07,
    pitchAccel: 0.014
  };
  var playActive = true;
  var PAN_STEP = 0.048;
  var FOV_STEP = 0.09;

  function startAutorotate() {
    if (typeof Marzipano.autorotate !== 'function') return;
    viewer.startMovement(Marzipano.autorotate(autorotateOpts));
  }

  function setPlayUi(on) {
    var b = document.getElementById('btn-play');
    var iP = document.getElementById('icon-play');
    var iPa = document.getElementById('icon-pause');
    if (b) {
      b.classList.toggle('is-on', on);
      b.setAttribute('aria-pressed', on ? 'true' : 'false');
    }
    if (iP) iP.style.display = on ? 'none' : 'block';
    if (iPa) iPa.style.display = on ? 'block' : 'none';
  }

  function getView() {
    return viewer.view();
  }

  function panYaw(d) {
    var v = getView();
    if (v) v.offsetYaw(d);
  }
  function panPitch(d) {
    var v = getView();
    if (v) v.offsetPitch(d);
  }
  function zoomDelta(d) {
    var v = getView();
    if (v) v.offsetFov(d);
  }

  function bindHoldRepeat(el, stepFn) {
    if (!el) return;
    var t = null;
    function tick() { stepFn(); }
    function down(ev) {
      if (ev.button != null && ev.button !== 0) return;
      tick();
      clearInterval(t);
      t = setInterval(tick, 90);
    }
    function up() {
      clearInterval(t);
      t = null;
    }
    el.addEventListener('mousedown', down);
    el.addEventListener('mouseup', up);
    el.addEventListener('mouseleave', up);
    el.addEventListener('touchstart', function (e) {
      e.preventDefault();
      down(e);
    }, { passive: false });
    el.addEventListener('touchend', up);
    el.addEventListener('touchcancel', up);
  }

  SCENES.forEach(function (s) {
    var source = Marzipano.ImageUrlSource.fromString(
      'tiles/' + s.id + '/{z}/{f}/{y}/{x}.jpg',
      { cubeMapPreviewUrl: 'tiles/' + s.id + '/preview.jpg' }
    );
    var geometry = new Marzipano.CubeGeometry(s.levels);
    var limiter = Marzipano.RectilinearView.limit.traditional(
      s.faceSize,
      100 * Math.PI / 180,
      120 * Math.PI / 180
    );
    var view = new Marzipano.RectilinearView(s.initialViewParameters, limiter);
    var mzScene = viewer.createScene({
      source: source,
      geometry: geometry,
      view: view,
      pinFirstLevel: true
    });

    // Link hotspots: navegan a otra escena por id (tooltip = nombre de escena actualizado).
    (s.linkHotspots || []).forEach(function (h, hi) {
      var el = document.createElement('div');
      el.className = 'vtb-hotspot vtb-hotspot-link';
      var btn = document.createElement('button');
      btn.className = 'vtb-hotspot-btn';
      btn.type = 'button';
      var destName = sceneDisplayNameById(h.target);
      btn.title = 'Ir a: ' + destName;
      btn.style.transform = 'rotate(' + (h.rotation || 0) + 'rad)';
      btn.innerHTML = hotspotSvgHtml(hi * 0.14);
      var tip = document.createElement('div');
      tip.className = 'vtb-hotspot-tip';
      tip.textContent = destName;
      el.appendChild(btn);
      el.appendChild(tip);
      btn.addEventListener('click', function (ev) {
        ev.stopPropagation();
        var idx = SCENES.findIndex(function (sc) { return sc.id === h.target; });
        if (idx >= 0) { switchTo(idx); }
      });
      mzScene.hotspotContainer().createHotspot(el, { yaw: h.yaw, pitch: h.pitch });
    });

    // Info hotspots: muestran tarjeta expandible.
    (s.infoHotspots || []).forEach(function (h, hi) {
      var el = document.createElement('div');
      el.className = 'vtb-hotspot vtb-hotspot-info';
      var btn = document.createElement('button');
      btn.className = 'vtb-hotspot-btn';
      btn.type = 'button';
      btn.title = h.title || 'Información';
      btn.innerHTML = hotspotSvgHtml((s.linkHotspots || []).length + hi * 0.14);
      var card = document.createElement('div');
      card.className = 'vtb-hotspot-info-card';
      var title = document.createElement('div');
      title.className = 'vtb-hotspot-info-title';
      title.textContent = h.title || 'Información';
      var text = document.createElement('div');
      text.className = 'vtb-hotspot-info-text';
      text.textContent = h.text || '';
      card.appendChild(title);
      card.appendChild(text);
      el.appendChild(btn);
      el.appendChild(card);
      btn.addEventListener('click', function (ev) {
        ev.stopPropagation();
        card.classList.toggle('open');
      });
      mzScene.hotspotContainer().createHotspot(el, { yaw: h.yaw, pitch: h.pitch });
    });

    mzScenes.push(mzScene);
  });

  function switchTo(idx) {
    if (!mzScenes[idx]) return;
    currentIdx = idx;
    mzScenes[idx].switchTo();
    updateUI();
    if (playActive) {
      setTimeout(function () {
        if (playActive) startAutorotate();
      }, 0);
    }
  }

  function updateUI() {
    var el = document.getElementById('vtb-scene-name');
    if (el) el.textContent = SCENES[currentIdx] ? SCENES[currentIdx].name : '';
    document.querySelectorAll('.vtb-thumb').forEach(function (t, i) {
      t.classList.toggle('active', i === currentIdx);
    });
    if (typeof _vtbUpdateFloorplanActive === 'function') _vtbUpdateFloorplanActive();
  }
  var _vtbUpdateFloorplanActive = null;

  var grid = document.getElementById('vtb-grid');
  SCENES.forEach(function (s, idx) {
    var thumb = document.createElement('div');
    thumb.className = 'vtb-thumb' + (idx === 0 ? ' active' : '');
    var img = document.createElement('img');
    var face = closestFaceForInitialView(s.initialViewParameters);
    img.alt = s.name;
    img.dataset.vtbFace = face;
    img.src = thumbTileUrl(s);
    img.onerror = function () {
      if (this.dataset.vtbFallback === '1') {
        this.style.opacity = '0.2';
        return;
      }
      this.dataset.vtbFallback = '1';
      this.src = 'tiles/' + encodeURIComponent(s.id) + '/preview.jpg';
      this.style.objectPosition = previewObjectPositionForFace(face);
    };
    var lbl = document.createElement('span');
    lbl.textContent = s.name;
    thumb.appendChild(img);
    thumb.appendChild(lbl);
    thumb.addEventListener('click', function () { switchTo(idx); closePanel(); });
    grid.appendChild(thumb);
  });

  function openPanel()  { document.getElementById('vtb-panel').classList.add('open');    panelOpen = true; }
  function closePanel() { document.getElementById('vtb-panel').classList.remove('open'); panelOpen = false; }

  function goPrevScene() {
    switchTo((currentIdx - 1 + mzScenes.length) % mzScenes.length);
  }
  function goNextScene() {
    switchTo((currentIdx + 1) % mzScenes.length);
  }
  function syncSideNavVisibility() {
    var hide = mzScenes.length <= 1;
    var sp = document.getElementById('vtb-side-prev');
    var sn = document.getElementById('vtb-side-next');
    if (sp) sp.classList.toggle('vtb-side-nav--off', hide);
    if (sn) sn.classList.toggle('vtb-side-nav--off', hide);
  }

  document.getElementById('btn-prev').addEventListener('click', goPrevScene);
  document.getElementById('btn-next').addEventListener('click', goNextScene);
  var sidePrev = document.getElementById('vtb-side-prev');
  var sideNext = document.getElementById('vtb-side-next');
  if (sidePrev) sidePrev.addEventListener('click', goPrevScene);
  if (sideNext) sideNext.addEventListener('click', goNextScene);
  syncSideNavVisibility();

  function wireGalleryAndFloorplan() {
    var fileFloor = document.getElementById('vtb-file-floorplan');
    var btnGallery = document.getElementById('btn-vtb-gallery');
    var btnFloor = document.getElementById('btn-vtb-floorplan');
    var floorPanel = document.getElementById('vtb-floorplan-panel');
    var floorImg = document.getElementById('vtb-floorplan-img');
    var floorHotspotsEl = document.getElementById('vtb-floorplan-hotspots');
    var floorClose = document.getElementById('vtb-floorplan-close');
    var floorRevoke = null;
    var floorReady = false;

    /* ── Galería / Carrusel ── */
    var galleryOverlay = document.getElementById('vtb-gallery-overlay');
    var galleryImgEl = document.getElementById('vtb-gallery-img');
    var galleryTitleEl = document.getElementById('vtb-gallery-title');
    var galleryCounterEl = document.getElementById('vtb-gallery-counter');
    var galleryCloseBtn = document.getElementById('vtb-gallery-close');
    var galleryPrevBtn = document.getElementById('vtb-gallery-prev');
    var galleryNextBtn = document.getElementById('vtb-gallery-next');
    var galleryCurIdx = 0;
    var galleryOpen = false;

    function galleryHasItems() { return GALLERY && GALLERY.length > 0; }

    if (!galleryHasItems() && btnGallery) {
      btnGallery.style.display = 'none';
    }

    function showGallerySlide(idx) {
      if (!galleryHasItems()) return;
      galleryCurIdx = ((idx % GALLERY.length) + GALLERY.length) % GALLERY.length;
      var item = GALLERY[galleryCurIdx];
      galleryImgEl.classList.add('vtb-fade');
      galleryTitleEl.classList.add('vtb-fade');
      setTimeout(function () {
        galleryImgEl.src = (item.imageUrl || item.imageDataUrl) || '';
        galleryImgEl.alt = item.title || '';
        galleryTitleEl.textContent = item.title || '';
        galleryCounterEl.textContent = (galleryCurIdx + 1) + ' / ' + GALLERY.length;
        galleryPrevBtn.style.display = GALLERY.length > 1 ? '' : 'none';
        galleryNextBtn.style.display = GALLERY.length > 1 ? '' : 'none';
        galleryImgEl.classList.remove('vtb-fade');
        galleryTitleEl.classList.remove('vtb-fade');
      }, 180);
    }

    function openGallery() {
      if (!galleryOverlay || !galleryHasItems()) return;
      galleryOpen = true;
      var sp = document.getElementById('vtb-side-prev');
      var sn = document.getElementById('vtb-side-next');
      if (sp) sp.classList.add('vtb-side-nav--off');
      if (sn) sn.classList.add('vtb-side-nav--off');
      galleryOverlay.classList.add('is-open');
      galleryOverlay.setAttribute('aria-hidden', 'false');
      showGallerySlide(0);
    }
    function closeGallery() {
      if (!galleryOverlay) return;
      galleryOpen = false;
      galleryOverlay.classList.remove('is-open');
      galleryOverlay.setAttribute('aria-hidden', 'true');
      syncSideNavVisibility();
    }

    if (btnGallery) {
      btnGallery.addEventListener('click', function () {
        if (galleryOpen) { closeGallery(); return; }
        openGallery();
      });
    }
    if (galleryCloseBtn) galleryCloseBtn.addEventListener('click', closeGallery);
    if (galleryPrevBtn) galleryPrevBtn.addEventListener('click', function () { showGallerySlide(galleryCurIdx - 1); });
    if (galleryNextBtn) galleryNextBtn.addEventListener('click', function () { showGallerySlide(galleryCurIdx + 1); });

    if (galleryOverlay) {
      galleryOverlay.addEventListener('click', function (e) {
        if (e.target === galleryOverlay) closeGallery();
      });
    }

    document.addEventListener('keydown', function (e) {
      if (!galleryOpen) return;
      if (e.key === 'Escape') closeGallery();
      if (e.key === 'ArrowLeft') showGallerySlide(galleryCurIdx - 1);
      if (e.key === 'ArrowRight') showGallerySlide(galleryCurIdx + 1);
    });

    function renderFloorplanHotspots() {
      if (!floorHotspotsEl || !FLOOR_PLAN || !FLOOR_PLAN.hotspots || !FLOOR_PLAN.hotspots.length) {
        if (floorHotspotsEl) floorHotspotsEl.innerHTML = '';
        return;
      }
      floorHotspotsEl.innerHTML = '';
      FLOOR_PLAN.hotspots.forEach(function (h, i) {
        var btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'vtb-floorplan-dot vtb-fp-anim-in';
        btn.style.left = (Number(h.x) * 100) + '%';
        btn.style.top = (Number(h.y) * 100) + '%';
        btn.style.animationDelay = (i * 0.06) + 's';
        btn.dataset.target = h.target;
        btn.title = sceneDisplayNameById(h.target);
        btn.setAttribute('aria-label', 'Ir a: ' + sceneDisplayNameById(h.target));
        btn.addEventListener('click', function (ev) {
          ev.stopPropagation();
          var idx = SCENES.findIndex(function (s) { return s.id === h.target; });
          if (idx >= 0) switchTo(idx);
        });
        floorHotspotsEl.appendChild(btn);
      });
      updateFloorplanActive();
    }

    function updateFloorplanActive() {
      if (!floorHotspotsEl) return;
      var activeId = SCENES[currentIdx] ? SCENES[currentIdx].id : '';
      var dots = floorHotspotsEl.querySelectorAll('.vtb-floorplan-dot');
      dots.forEach(function (d) {
        var isActive = d.dataset.target === activeId;
        d.classList.toggle('vtb-fp-active', isActive);
      });
    }

    function openFloorPanel() {
      if (!floorPanel) return;
      floorPanel.classList.add('is-open');
      floorPanel.setAttribute('aria-hidden', 'false');
      if (btnFloor) btnFloor.classList.add('vtb-tool-btn--hidden');
      renderFloorplanHotspots();
    }
    function closeFloorPanel() {
      if (!floorPanel) return;
      floorPanel.classList.remove('is-open');
      floorPanel.setAttribute('aria-hidden', 'true');
      if (btnFloor) btnFloor.classList.remove('vtb-tool-btn--hidden');
    }

    if (FLOOR_PLAN && floorImg) {
      var floorSrc = FLOOR_PLAN.imageUrl || FLOOR_PLAN.imageDataUrl;
      if (floorSrc) {
        floorImg.onload = function () { renderFloorplanHotspots(); };
        floorImg.src = floorSrc;
        if (floorImg.complete) renderFloorplanHotspots();
        floorReady = true;
      }
    }

    if (btnFloor && fileFloor) {
      btnFloor.addEventListener('click', function (ev) {
        if (ev.shiftKey) {
          fileFloor.click();
          return;
        }
        if (floorReady) {
          openFloorPanel();
          return;
        }
        fileFloor.click();
      });
      fileFloor.addEventListener('change', function () {
        var f = fileFloor.files && fileFloor.files[0];
        if (!f || f.type.indexOf('image/') !== 0) return;
        if (floorRevoke) {
          URL.revokeObjectURL(floorRevoke);
          floorRevoke = null;
        }
        floorRevoke = URL.createObjectURL(f);
        FLOOR_PLAN = { hotspots: [] };
        if (floorImg) {
          floorImg.onload = function () { renderFloorplanHotspots(); };
          floorImg.src = floorRevoke;
          if (floorImg.complete) renderFloorplanHotspots();
        }
        floorReady = true;
        openFloorPanel();
        fileFloor.value = '';
      });
    }

    if (floorClose) floorClose.addEventListener('click', closeFloorPanel);

    _vtbUpdateFloorplanActive = updateFloorplanActive;
  }

  (function wireTopLeftLogo() {
    var tl = document.getElementById('vtb-top-logo-link');
    if (tl && !TOP_LEFT_LOGO_HAS_LINK) {
      tl.addEventListener('click', function (e) { e.preventDefault(); });
    }
  })();

  wireGalleryAndFloorplan();

  document.getElementById('btn-grid').addEventListener('click', function () {
    panelOpen ? closePanel() : openPanel();
  });

  var btnFs = document.getElementById('btn-fs');
  var iconFs = document.getElementById('icon-fs');
  var FS_OPEN  = '<polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/>';
  var FS_CLOSE = '<polyline points="4 14 10 14 10 20"/><polyline points="20 10 14 10 14 4"/><line x1="10" y1="14" x2="3" y2="21"/><line x1="21" y1="3" x2="14" y2="10"/>';
  function isFullscreenDoc() {
    return !!(document.fullscreenElement || document.webkitFullscreenElement || document.msFullscreenElement);
  }
  function syncFullscreenUi() {
    document.documentElement.classList.toggle('vtb-fullscreen', isFullscreenDoc());
    if (viewer && typeof viewer.updateSize === 'function') {
      viewer.updateSize();
    }
  }

  btnFs.addEventListener('click', function () {
    if (!isFullscreenDoc()) {
      var el = document.documentElement;
      var req = el.requestFullscreen || el.webkitRequestFullscreen || el.msRequestFullscreen;
      if (req) req.call(el).catch(function () {});
    } else {
      var ex = document.exitFullscreen || document.webkitExitFullscreen || document.msExitFullscreen;
      if (ex) ex.call(document).catch(function () {});
    }
  });
  function onFullscreenEvent() {
    if (iconFs) iconFs.innerHTML = isFullscreenDoc() ? FS_CLOSE : FS_OPEN;
    syncFullscreenUi();
  }
  document.addEventListener('fullscreenchange', onFullscreenEvent);
  document.addEventListener('webkitfullscreenchange', onFullscreenEvent);
  document.addEventListener('MSFullscreenChange', onFullscreenEvent);
  window.addEventListener('resize', function () {
    if (viewer && typeof viewer.updateSize === 'function') viewer.updateSize();
  });

  var btnPlay = document.getElementById('btn-play');
  if (btnPlay) {
    btnPlay.addEventListener('click', function () {
      playActive = !playActive;
      if (playActive) {
        startAutorotate();
      } else {
        viewer.stopMovement();
      }
      setPlayUi(playActive);
    });
  }
  setPlayUi(true);
  startAutorotate();

  bindHoldRepeat(document.getElementById('btn-pan-left'), function () { panYaw(-PAN_STEP); });
  bindHoldRepeat(document.getElementById('btn-pan-right'), function () { panYaw(PAN_STEP); });
  bindHoldRepeat(document.getElementById('btn-pan-up'), function () { panPitch(PAN_STEP); });
  bindHoldRepeat(document.getElementById('btn-pan-down'), function () { panPitch(-PAN_STEP); });
  bindHoldRepeat(document.getElementById('btn-zoom-in'), function () { zoomDelta(-FOV_STEP); });
  bindHoldRepeat(document.getElementById('btn-zoom-out'), function () { zoomDelta(FOV_STEP); });

  var barEl = document.getElementById('vtb-bar');
  var restoreUi = document.getElementById('vtb-restore-ui');
  var btnCollapse = document.getElementById('btn-collapse-bar');
  if (btnCollapse && barEl) {
    btnCollapse.addEventListener('click', function () {
      barEl.classList.add('vtb-bar--hidden');
      document.body.classList.add('vtb-bar-hidden');
    });
  }
  if (restoreUi && barEl) {
    restoreUi.addEventListener('click', function () {
      barEl.classList.remove('vtb-bar--hidden');
      document.body.classList.remove('vtb-bar-hidden');
    });
  }

  document.addEventListener('click', function (e) {
    if (!panelOpen) return;
    var panel = document.getElementById('vtb-panel');
    var bar   = document.getElementById('vtb-bar');
    var restore = document.getElementById('vtb-restore-ui');
    var sideP = document.getElementById('vtb-side-prev');
    var sideN = document.getElementById('vtb-side-next');
    var rightTools = document.querySelector('.vtb-right-tools');
    var floorP = document.getElementById('vtb-floorplan-panel');
    var topLogo = document.getElementById('vtb-top-logo-link');
    var galOv = document.getElementById('vtb-gallery-overlay');
    if (!panel.contains(e.target) && !bar.contains(e.target) &&
        !(restore && restore.contains(e.target)) &&
        !(sideP && sideP.contains(e.target)) &&
        !(sideN && sideN.contains(e.target)) &&
        !(rightTools && rightTools.contains(e.target)) &&
        !(topLogo && topLogo.contains(e.target)) &&
        !(galOv && galOv.classList.contains('is-open') && galOv.contains(e.target)) &&
        !(floorP && floorP.contains(e.target))) closePanel();
  });

  if (mzScenes.length > 0) switchTo(0);
})();
</script>
</body>
